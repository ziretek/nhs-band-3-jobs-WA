name: NHS Daily Alert

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Scrape Band 3 NHS jobs
        run: |
          python3 work/nhs_today_alert.py \
            --alert-title "NHS Band 3 permanent full-time visa sponsorship alert" \
            --heading "Band 3 permanent full-time visa sponsorship jobs" \
            --output outputs/todays_nhs_notification.txt \
            --html-output outputs/todays_nhs_notification.html

      - name: Scrape Band 4 NHS jobs
        run: |
          python3 work/nhs_today_alert.py \
            --pay-band "BAND_4" \
            --alert-title "NHS Band 4 permanent full-time visa sponsorship alert" \
            --heading "Band 4 permanent full-time visa sponsorship jobs" \
            --search-label "Band 4 NHS Jobs" \
            --search-link-label "NHS Jobs Band 4 visa sponsorship search" \
            --salary-label "Salary/Band" \
            --output outputs/band_4_notification.txt \
            --html-output outputs/band_4_notification.html

      - name: Send Band 3 results via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 work/send_telegram.py \
            --body-file outputs/todays_nhs_notification.txt

      - name: Send Band 4 results via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 work/send_telegram.py \
            --body-file outputs/band_4_notification.txt
