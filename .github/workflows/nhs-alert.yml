name: NHS Daily Alert

on:
  schedule:
    # Runs daily at 8:00 AM UTC (adjust as needed)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Scrape Band 3 NHS jobs
        run: |
          python3 work/nhs_today_alert.py \
            --output outputs/todays_nhs_notification.txt \
            --html-output outputs/todays_nhs_notification.html

      - name: Scrape Healthcare Assistant NHS jobs
        run: |
          python3 work/nhs_today_alert.py \
            --keyword "healthcare assistant" \
            --pay-band "" \
            --alert-title "NHS Healthcare Assistant visa sponsorship alert" \
            --heading "Active Healthcare Assistant visa sponsorship jobs" \
            --search-label "Healthcare Assistant NHS Jobs" \
            --search-link-label "NHS Jobs healthcare assistant sponsorship search" \
            --salary-label "Salary" \
            --output outputs/healthcare_assistant_notification.txt \
            --html-output outputs/healthcare_assistant_notification.html

      - name: Send Band 3 results via WhatsApp
        env:
          WA_ACCESS_TOKEN: ${{ secrets.WA_ACCESS_TOKEN }}
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_TO: ${{ secrets.WA_TO }}
        run: |
          python3 work/send_whatsapp.py \
            --body-file outputs/todays_nhs_notification.txt

      - name: Send Healthcare Assistant results via WhatsApp
        env:
          WA_ACCESS_TOKEN: ${{ secrets.WA_ACCESS_TOKEN }}
          WA_PHONE_NUMBER_ID: ${{ secrets.WA_PHONE_NUMBER_ID }}
          WA_TO: ${{ secrets.WA_TO }}
        run: |
          python3 work/send_whatsapp.py \
            --body-file outputs/healthcare_assistant_notification.txt
